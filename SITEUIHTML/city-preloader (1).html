<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>City Preloader</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0b0d13;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    gap: 40px;
    flex-wrap: wrap;
  }

  /* ── demo: multiple sizes ── */
  .demo { display:flex; flex-direction:column; align-items:center; gap:8px; }
  .demo label {
    color: rgba(255,255,255,.25);
    font: 10px/1 'Courier New', monospace;
    letter-spacing: .15em;
  }

  /* ── the preloader itself ── */
  .preloader {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 7px;
  }

  .city-icon svg {
    display: block;
    overflow: visible;
  }

  /* size variants */
  .size-sm  .city-icon svg { width: 64px;  height: 44px; }
  .size-md  .city-icon svg { width: 96px;  height: 64px; }
  .size-lg  .city-icon svg { width: 140px; height: 93px; }

  /* dots */
  .dots { display:flex; gap:4px; align-items:center; }
  .dots span {
    width: 3px; height: 3px;
    border-radius: 50%;
    background: #3de0ff;
    animation: blink 1.1s ease-in-out infinite;
  }
  .dots span:nth-child(2) { animation-delay:.18s; }
  .dots span:nth-child(3) { animation-delay:.36s; }
  .size-sm .dots span { width:2px; height:2px; }
  .size-lg .dots span { width:4px; height:4px; gap:5px; }

  @keyframes blink {
    0%,100% { opacity:.15; transform:scale(1); }
    50%      { opacity:1;   transform:scale(1.5); }
  }
</style>
</head>
<body>

<!--
  SKYLINE drawn on a 100 × 62 grid.
  Buildings left→right, baseline at y=60.
  Single polygon — roofline traced left to right, closed along bottom.

  bldg  x-range   roof-y   notes
  ────────────────────────────────
  A     0–7        46       short left anchor
  B     7–15       36       medium
  C     15–25      20       tall, stepped setback at x17/x23
  D     25–30      34       connector
  E     30–46      12       tallest, spire at x38 →y7
  F     46–55      26       medium-tall
  G     55–62      40       short gap
  H     62–70      20       tall right cluster
  I     70–78      30       medium
  J     78–86      44       short
  K     86–100     52       low right anchor
-->

<div class="demo">
  <label>SM</label>
  <div class="preloader size-sm">
    <div class="city-icon">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 62">
        <defs>
          <filter id="glow-sm" x="-40%" y="-40%" width="180%" height="180%">
            <feGaussianBlur in="SourceGraphic" stdDeviation="1.8" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <clipPath id="reveal-sm">
            <rect x="0" y="0" width="0" height="62">
              <animate attributeName="width" from="0" to="100" dur="2s" repeatCount="indefinite" calcMode="linear"/>
            </rect>
          </clipPath>
          <linearGradient id="lit-sm" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#3de0ff"/>
            <stop offset="100%" stop-color="#0e7faa" stop-opacity=".7"/>
          </linearGradient>
        </defs>
        <!-- ghost -->
        <polygon fill="#182830" points="
          0,60 0,46 7,46 7,36 15,36 15,24 17,24 17,20 23,20 23,24 25,24 25,34
          30,34 30,12 35,12 35,8  38,7  41,8  41,12 46,12 46,26 55,26 55,40
          62,40 62,20 70,20 70,30 78,30 78,44 86,44 86,52 100,52 100,60
        "/>
        <!-- lit -->
        <polygon fill="url(#lit-sm)" clip-path="url(#reveal-sm)" filter="url(#glow-sm)" points="
          0,60 0,46 7,46 7,36 15,36 15,24 17,24 17,20 23,20 23,24 25,24 25,34
          30,34 30,12 35,12 35,8  38,7  41,8  41,12 46,12 46,26 55,26 55,40
          62,40 62,20 70,20 70,30 78,30 78,44 86,44 86,52 100,52 100,60
        "/>
        <!-- sweep -->
        <g filter="url(#glow-sm)">
          <line y1="0" y2="62" stroke="#3de0ff" stroke-width="4" stroke-opacity=".1">
            <animate attributeName="x1" from="0" to="100" dur="2s" repeatCount="indefinite"/>
            <animate attributeName="x2" from="0" to="100" dur="2s" repeatCount="indefinite"/>
          </line>
          <line y1="0" y2="62" stroke="#3de0ff" stroke-width=".8" stroke-opacity=".9">
            <animate attributeName="x1" from="0" to="100" dur="2s" repeatCount="indefinite"/>
            <animate attributeName="x2" from="0" to="100" dur="2s" repeatCount="indefinite"/>
          </line>
        </g>
      </svg>
    </div>
    <div class="dots"><span></span><span></span><span></span></div>
  </div>
</div>

<div class="demo">

          </linearGradient>
        </defs>
        <polygon fill="#182830" points="
          0,60 0,46 7,46 7,36 15,36 15,24 17,24 17,20 23,20 23,24 25,24 25,34
          30,34 30,12 35,12 35,8  38,7  41,8  41,12 46,12 46,26 55,26 55,40
          62,40 62,20 70,20 70,30 78,30 78,44 86,44 86,52 100,52 100,60
        "/>
        <polygon fill="url(#lit-md)" clip-path="url(#reveal-md)" filter="url(#glow-md)" points="
          0,60 0,46 7,46 7,36 15,36 15,24 17,24 17,20 23,20 23,24 25,24 25,34
          30,34 30,12 35,12 35,8  38,7  41,8  41,12 46,12 46,26 55,26 55,40
          62,40 62,20 70,20 70,30 78,30 78,44 86,44 86,52 100,52 100,60

            <animate attributeName="x2" from="0" to="100" dur="2s" repeatCount="indefinite"/>
          </line>
          <line y1="0" y2="62" stroke="#3de0ff" stroke-width=".8" stroke-opacity=".9">
            <animate attributeName="x1" from="0" to="100" dur="2s" repeatCount="indefinite"/>
            <animate attributeName="x2" from="0" to="100" dur="2s" repeatCount="indefinite"/>
          </line>
        </g>
      </svg>
    </div>
    <div class="dots"><span></span><span></span><span></span></div>
  </div>
</div>

<div class="demo">
  <label>LG</label>
  <div class="preloader size-lg">
    <div class="city-icon">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 62">
        <defs>
          <filter id="glow-lg" x="-40%" y="-40%" width="180%" height="180%">
            <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="b1"/>
            <feGaussianBlur in="SourceGraphic" stdDeviation="6"   result="b2"/>
            <feMerge>
              <feMergeNode in="b2"/>
              <feMergeNode in="b1"/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>
          <clipPath id="reveal-lg">
            <rect x="0" y="0" width="0" height="62">
              <animate attributeName="width" from="0" to="100" dur="2s" repeatCount="indefinite" calcMode="linear"/>
            </rect>
          </clipPath>
          <linearGradient id="lit-lg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#3de0ff"/>
            <stop offset="100%" stop-color="#0e7faa" stop-opacity=".7"/>
          </linearGradient>
        </defs>
        <polygon fill="#182830" points="
          0,60 0,46 7,46 7,36 15,36 15,24 17,24 17,20 23,20 23,24 25,24 25,34
          30,34 30,12 35,12 35,8  38,7  41,8  41,12 46,12 46,26 55,26 55,40
          62,40 62,20 70,20 70,30 78,30 78,44 86,44 86,52 100,52 100,60
        "/>
        <polygon fill="url(#lit-lg)" clip-path="url(#reveal-lg)" filter="url(#glow-lg)" points="
          0,60 0,46 7,46 7,36 15,36 15,24 17,24 17,20 23,20 23,24 25,24 25,34
          30,34 30,12 35,12 35,8  38,7  41,8  41,12 46,12 46,26 55,26 55,40
          62,40 62,20 70,20 70,30 78,30 78,44 86,44 86,52 100,52 100,60
        "/>
        <g filter="url(#glow-lg)">
          <line y1="0" y2="62" stroke="#3de0ff" stroke-width="4" stroke-opacity=".12">
            <animate attributeName="x1" from="0" to="100" dur="2s" repeatCount="indefinite"/>
            <animate attributeName="x2" from="0" to="100" dur="2s" repeatCount="indefinite"/>
          </line>
          <line y1="0" y2="62" stroke="#3de0ff" stroke-width=".8" stroke-opacity="1">
            <animate attributeName="x1" from="0" to="100" dur="2s" repeatCount="indefinite"/>
            <animate attributeName="x2" from="0" to="100" dur="2s" repeatCount="indefinite"/>
          </line>
        </g>
      </svg>
    </div>
    <div class="dots"><span></span><span></span><span></span></div>
  </div>
</div>

</body>
</html>
